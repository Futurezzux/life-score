<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>现状评分器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; font-size: 1.8rem; color: #333; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .step { display: none; }
    .step.active { display: block; }
    .step-title { font-size: 1.1rem; font-weight: 600; color: #444; margin-bottom: 16px; }
    .options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .opt-btn {
      padding: 10px 18px;
      border: 2px solid #ddd;
      border-radius: 30px;
      background: #f9f9f9;
      cursor: pointer;
      font-size: 0.95rem;
      color: #555;
      transition: all 0.2s;
      user-select: none;
    }
    .opt-btn:hover { border-color: #764ba2; color: #764ba2; }
    .opt-btn.selected { background: #764ba2; border-color: #764ba2; color: #fff; }
    .opt-btn.multi.selected { background: #667eea; border-color: #667eea; color: #fff; }
    .nav-btns { display: flex; justify-content: space-between; margin-top: 10px; }
    .btn { padding: 11px 28px; border: none; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { background: #eee; color: #666; }
    .btn-secondary:hover { background: #ddd; }
    .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#667eea,#764ba2); border-radius: 3px; transition: width 0.4s; }
    #result { display: none; text-align: center; }
    .score-circle {
      width: 140px; height: 140px; border-radius: 50%;
      margin: 0 auto 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 2.8rem; font-weight: 700; color: #fff;
    }
    .score-label { font-size: 0.85rem; margin-top: 2px; }
    .score-desc { font-size: 1.05rem; color: #555; margin: 10px 0 20px; line-height: 1.7; }
    .detail-list { text-align: left; background: #f7f7fb; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
    .detail-list li { list-style: none; padding: 5px 0; font-size: 0.92rem; color: #555; border-bottom: 1px solid #eee; }
    .detail-list li:last-child { border-bottom: none; }
    .detail-list li span { float: right; font-weight: 600; }
    .restart-btn { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border: none; padding: 12px 36px; border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <h1>🌟 现状评分器</h1>
  <p class="subtitle">客观评估你当前的生活状态，满分 10 分</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="step active" id="step-0">
    <div class="step-title">你目前的身份是？</div>
    <div class="options" id="opts-identity">
      <div class="opt-btn" data-val="student">🎒 学生</div>
      <div class="opt-btn" data-val="worker">💼 上班族</div>
    </div>
    <div class="nav-btns"><span></span><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-1">
    <div class="step-title" id="step1-title"></div>
    <div class="options" id="opts-sub"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-2">
    <div class="step-title" id="step2-title"></div>
    <div class="options" id="opts-step2"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-3">
    <div class="step-title" id="step3-title"></div>
    <div class="options" id="opts-step3"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-4">
    <div class="step-title" id="step4-title"></div>
    <div class="options" id="opts-step4"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-5">
    <div class="step-title" id="step5-title"></div>
    <div class="options" id="opts-step5"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-6">
    <div class="step-title" id="step6-title"></div>
    <div class="options" id="opts-step6"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>

  <div class="step" id="step-7">
    <div class="step-title" id="step7-title"></div>
    <div class="options" id="opts-step7"></div>
    <div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="calcScore()">查看结果</button></div>
  </div>

  <div id="result">
    <div class="score-circle" id="scoreCircle">
      <div id="scoreNum">--</div>
      <div class="score-label">/ 10</div>
    </div>
    <div id="scoreTag" style="font-size:1.3rem;font-weight:700;margin-bottom:8px;"></div>
    <div class="score-desc" id="scoreDesc"></div>
    <ul class="detail-list" id="detailList"></ul>
    <button class="restart-btn" onclick="restart()">🔄 重新测评</button>
  </div>
</div>

<script>
const answers = {};
let currentStep = 0;
let identity = '';

const studentFlow = [
  { title:'你目前的学历阶段是？', key:'edu', multi:false, options:[
    {label:'高中及以下', val:'highschool', score:0},
    {label:'本科生', val:'bachelor', score:0.5},
    {label:'研究生', val:'master', score:1},
  ]},
  { title:'你有没有在谈的对象？', key:'relationship', multi:false, options:[
    {label:'有，感情稳定 ❤️', val:'stable', score:2},
    {label:'有，但状态一般', val:'ok', score:1},
    {label:'单身，但不着急', val:'single_ok', score:1},
    {label:'单身，有点焦虑', val:'single_bad', score:0},
  ]},
  { title:'有没有喜欢玩的游戏？', key:'game', multi:false, options:[
    {label:'有，经常玩很解压', val:'yes_good', score:1},
    {label:'有，但玩得太多影响生活', val:'yes_bad', score:0},
    {label:'没有，不感兴趣', val:'no', score:0.5},
  ]},
  { title:'有没有兴趣爱好？（可多选）', key:'hobby', multi:true, options:[
    {label:'音乐/乐器', val:'music', score:0.5},
    {label:'绘画/手工', val:'art', score:0.5},
    {label:'阅读/写作', val:'reading', score:0.5},
    {label:'摄影/视频', val:'photo', score:0.5},
    {label:'没有特别的爱好', val:'none', score:0},
  ]},
  { title:'有没有喜欢的运动？', key:'sport', multi:false, options:[
    {label:'有，坚持锻炼', val:'yes_regular', score:1.5},
    {label:'有，偶尔运动', val:'yes_sometimes', score:0.8},
    {label:'没有，不太运动', val:'no', score:0},
  ]},
  { title:'学业压力如何？', key:'study_pressure', multi:false, options:[
    {label:'压力不大，游刃有余', val:'low', score:1.5},
    {label:'有压力，但能应对', val:'mid', score:1},
    {label:'压力很大，有些吃力', val:'high', score:0.3},
    {label:'极度焦虑，快撑不住', val:'extreme', score:0},
  ]},
  { title:'你对目前生活的整体满意度？', key:'satisfaction', multi:false, options:[
    {label:'很满意，状态不错', val:'great', score:2},
    {label:'还行，凑合过', val:'ok', score:1},
    {label:'不太满意，有些迷茫', val:'bad', score:0.3},
    {label:'很不满意，想改变', val:'terrible', score:0},
  ]},
];

const workerFlow = [
  { title:'你的工作性质是？', key:'sector', multi:false, options:[
    {label:'体制内（公务员/事业单位/国企）', val:'public', score:1},
    {label:'体制外（私企/外企/自由职业等）', val:'private', score:0.5},
  ]},
  { title:'你所在的城市级别是？', key:'city', multi:false, options:[
    {label:'一线城市', val:'tier1', score:0.5},
    {label:'新一线城市', val:'tier1_5', score:0.8},
    {label:'二线城市', val:'tier2', score:1},
    {label:'三线城市', val:'tier3', score:1},
    {label:'四五线城市', val:'tier4', score:0.8},
  ]},
  { title:'城市离你家乡近吗？', key:'hometown', multi:false, options:[
    {label:'就在家附近，很近', val:'near', score:1.5},
    {label:'同省，还算近', val:'same_prov', score:1},
    {label:'跨省，比较远', val:'far', score:0.3},
    {label:'很远，几乎回不去', val:'very_far', score:0},
  ]},
  { title:'你的休息制度是？', key:'rest', multi:false, options:[
    {label:'双休（周六日休）', val:'two_day', score:2},
    {label:'大小周', val:'alt', score:1},
    {label:'单休', val:'one_day', score:0.5},
    {label:'几乎没有固定休息', val:'none', score:0},
  ]},
  { title:'你的上下班时间是？', key:'hours', multi:false, options:[
    {label:'朝九晚五 / 朝九晚六', val:'normal', score:2},
    {label:'早八晚六 / 早九晚七', val:'slightly_long', score:1.2},
    {label:'早八晚八（10小时+）', val:'long', score:0.5},
    {label:'早八晚十以上（996/007）', val:'extreme', score:0},
  ]},
  { title:'经常加班吗？', key:'overtime', multi:false, options:[
    {label:'基本不加班', val:'no', score:1.5},
    {label:'偶尔加班，可接受', val:'sometimes', score:1},
    {label:'经常加班，有些疲惫', val:'often', score:0.3},
    {label:'几乎天天加班，身心俱疲', val:'always', score:0},
  ]},
  { title:'你的薪资水平如何？', key:'salary', multi:false, options:[
    {label:'远超同龄人，很满意', val:'high', score:2},
    {label:'和同龄人差不多', val:'mid', score:1.2},
    {label:'略低，有些压力', val:'low', score:0.5},
    {label:'入不敷出，压力很大', val:'very_low', score:0},
  ]},
];

function getFlow() { return identity === 'student' ? studentFlow : workerFlow; }

function updateProgress() {
  const total = getFlow().length + 1;
  const pct = Math.round((currentStep / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderStep(stepIndex) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('result').style.display = 'none';

  if (stepIndex === 0) { document.getElementById('step-0').classList.add('active'); return; }

  if (stepIndex === 1) {
    document.getElementById('step-1').classList.add('active');
    const flow = getFlow();
    const cfg = flow[0];
    document.getElementById('step1-title').textContent = cfg.title;
    renderOptions('opts-sub', cfg.options, cfg.key, cfg.multi);
    return;
  }

  const flowIdx = stepIndex - 1;
  const flow = getFlow();
  if (flowIdx >= flow.length) return;
  const cfg = flow[flowIdx];
  document.getElementById('step' + stepIndex + '-title').textContent = cfg.title;
  renderOptions('opts-step' + stepIndex, cfg.options, cfg.key, cfg.multi);
  document.getElementById('step-' + stepIndex).classList.add('active');
}

function renderOptions(containerId, options, key, multi) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'opt-btn' + (multi ? ' multi' : '');
    btn.textContent = opt.label;
    btn.dataset.val = opt.val;
    if (multi) { if ((answers[key]||[]).includes(opt.val)) btn.classList.add('selected'); }
    else { if (answers[key] === opt.val) btn.classList.add('selected'); }
    btn.addEventListener('click', () => {
      if (multi) {
        if (!answers[key]) answers[key] = [];
        if (btn.classList.contains('selected')) { btn.classList.remove('selected'); answers[key] = answers[key].filter(v => v !== opt.val); }
        else { btn.classList.add('selected'); answers[key].push(opt.val); }
      } else {
        container.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        answers[key] = opt.val;
      }
    });
    container.appendChild(btn);
  });
}

function nextStep() {
  if (currentStep === 0) {
    if (!answers['identity']) { alert('请先选择身份'); return; }
    identity = answers['identity'];
    currentStep = 1;
    renderStep(1); updateProgress(); return;
  }
  const flowIdx = currentStep - 1;
  const flow = getFlow();
  const cfg = flow[flowIdx];
  if (cfg.multi) { if (!answers[cfg.key] || answers[cfg.key].length === 0) { alert('请至少选择一项'); return; } }
  else { if (!answers[cfg.key]) { alert('请先选择'); return; } }
  currentStep++;
  if (currentStep > flow.length) { calcScore(); }
  else { renderStep(currentStep); updateProgress(); }
}

function prevStep() {
  if (currentStep <= 0) return;
  currentStep--;
  renderStep(currentStep); updateProgress();
}

document.querySelectorAll('#opts-identity .opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#opts-identity .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers['identity'] = btn.dataset.val;
  });
});

function calcScore() {
  const flow = getFlow();
  let total = 0, maxTotal = 0;
  const details = [];
  flow.forEach(cfg => {
    const key = cfg.key;
    let score = 0, max = 0;
    if (cfg.multi) {
      const arr = answers[key] || [];
      arr.forEach(v => { const opt = cfg.options.find(o => o.val === v); if (opt) score += opt.score; });
      max = Math.max(...cfg.options.map(o => o.score)) * 2;
    } else {
      const opt = cfg.options.find(o => o.val === answers[key]);
      if (opt) score = opt.score;
      max = Math.max(...cfg.options.map(o => o.score));
    }
    total += score; maxTotal += max;
    details.push({ label: cfg.title.replace('？',''), score, max });
  });
  const ratio = maxTotal > 0 ? total / maxTotal : 0;
  let finalScore = Math.round((ratio * 11) - 1);
  finalScore = Math.max(-1, Math.min(10, finalScore));
  showResult(finalScore, details);
}

function showResult(score, details) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('result').style.display = 'block';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('scoreNum').textContent = score;
  const circle = document.getElementById('scoreCircle');
  let tag = '', desc = '', color = '';
  if (score <= -1) { tag='😔 当前状态堪忧'; desc='生活压力较大，建议认真思考改变的方向，照顾好自己的身心健康。'; color='#e74c3c'; }
  else if (score <= 2) { tag='😟 有些低迷'; desc='目前状态不太理想，但每个低谷都是转折的起点，慢慢来。'; color='#e67e22'; }
  else if (score <= 4) { tag='😐 平平无奇'; desc='生活还算稳定，但缺少一些亮点。可以尝试增加一些让自己开心的事情。'; color='#f39c12'; }
  else if (score <= 6) { tag='🙂 状态不错'; desc='整体生活质量良好，继续保持，适当优化薄弱环节。'; color='#27ae60'; }
  else if (score <= 8) { tag='😊 相当不错'; desc='你的生活状态很好，工作/学习与生活达到了较好的平衡，值得羡慕！'; color='#2980b9'; }
  else { tag='🌟 人生赢家'; desc='各方面都很出色，继续享受当下的美好生活吧！'; color='#8e44ad'; }
  circle.style.background = color;
  document.getElementById('scoreTag').textContent = tag;
  document.getElementById('scoreTag').style.color = color;
  document.getElementById('scoreDesc').textContent = desc;
  const list = document.getElementById('detailList');
  list.innerHTML = '';
  details.forEach(d => {
    const li = document.createElement('li');
    const pct = d.max > 0 ? Math.round((d.score / d.max) * 100) : 0;
    li.innerHTML = d.label + '<span>' + pct + '%</span>';
    list.appendChild(li);
  });
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  currentStep = 0; identity = '';
  document.getElementById('result').style.display = 'none';
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  renderStep(0); updateProgress();
}

updateProgress();
</script>
</body>
</html>
