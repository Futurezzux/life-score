<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打工人现状评分器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; font-size: 1.8rem; color: #333; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .step { display: none; }
    .step.active { display: block; }
    .step-title { font-size: 1.05rem; font-weight: 600; color: #444; margin-bottom: 16px; line-height: 1.5; }
    .options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .opt-btn {
      padding: 10px 18px;
      border: 2px solid #ddd;
      border-radius: 30px;
      background: #f9f9f9;
      cursor: pointer;
      font-size: 0.92rem;
      color: #555;
      transition: all 0.2s;
      user-select: none;
    }
    .opt-btn:hover { border-color: #764ba2; color: #764ba2; }
    .opt-btn.selected { background: #764ba2; border-color: #764ba2; color: #fff; }
    .nav-btns { display: flex; justify-content: space-between; margin-top: 4px; }
    .btn { padding: 11px 28px; border: none; border-radius: 30px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { background: #eee; color: #666; }
    .btn-secondary:hover { background: #ddd; }
    .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#667eea,#764ba2); border-radius: 3px; transition: width 0.4s; }
    .step-counter { text-align: right; font-size: 0.8rem; color: #bbb; margin-bottom: 10px; }
    #result { display: none; text-align: center; }
    .score-circle {
      width: 150px; height: 150px; border-radius: 50%;
      margin: 0 auto 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 3rem; font-weight: 700; color: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .score-label { font-size: 0.85rem; margin-top: 2px; opacity: 0.9; }
    .score-tag { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; }
    .score-msg {
      font-size: 1rem; color: #555; margin: 0 0 20px;
      line-height: 1.8; background: #f7f7fb;
      border-radius: 12px; padding: 16px 20px;
      text-align: left;
    }
    .restart-btn {
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: #fff; border: none; padding: 12px 36px;
      border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    .restart-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
<div class="card">
  <h1>💼 打工人现状评分</h1>
  <p class="subtitle">测测你现在的打工生活质量，满分 10 分</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="step-counter" id="stepCounter"></div>

  <div class="step active" id="step-0">
    <div class="step-title">你的工作性质是？</div>
    <div class="options" id="opts-0"></div>
    <div class="nav-btns"><span></span><button class="btn btn-primary" onclick="nextStep()">下一步</button></div>
  </div>
  <div class="step" id="step-1"><div class="step-title" id="title-1"></div><div class="options" id="opts-1"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-2"><div class="step-title" id="title-2"></div><div class="options" id="opts-2"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-3"><div class="step-title" id="title-3"></div><div class="options" id="opts-3"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-4"><div class="step-title" id="title-4"></div><div class="options" id="opts-4"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-5"><div class="step-title" id="title-5"></div><div class="options" id="opts-5"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-6"><div class="step-title" id="title-6"></div><div class="options" id="opts-6"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-7"><div class="step-title" id="title-7"></div><div class="options" id="opts-7"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-8"><div class="step-title" id="title-8"></div><div class="options" id="opts-8"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="nextStep()">下一步</button></div></div>
  <div class="step" id="step-9"><div class="step-title" id="title-9"></div><div class="options" id="opts-9"></div><div class="nav-btns"><button class="btn btn-secondary" onclick="prevStep()">上一步</button><button class="btn btn-primary" onclick="calcScore()">查看结果</button></div></div>

  <div id="result">
    <div class="score-circle" id="scoreCircle">
      <div id="scoreNum">--</div>
      <div class="score-label">/ 10</div>
    </div>
    <div class="score-tag" id="scoreTag"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restart()">🔄 重新测评</button>
  </div>
</div>

<script>
const TOTAL_STEPS = 10;
const answers = {};
let currentStep = 0;

const flow = [
  { key:'sector', title:'你的工作性质是？', options:[
    { label:'🏛️ 体制内（公务员 / 事业单位 / 国企）', val:'public', score:1 },
    { label:'🏢 体制外（私企 / 外企 / 自由职业）', val:'private', score:0.5 }
  ]},
  { key:'city', title:'你目前工作的城市级别是？', options:[
    { label:'一线城市（北上广深）', val:'tier1', score:0.5 },
    { label:'新一线城市', val:'tier1_5', score:0.8 },
    { label:'二线城市', val:'tier2', score:1 },
    { label:'三线城市', val:'tier3', score:1 },
    { label:'四五线城市', val:'tier4', score:0.8 }
  ]},
  { key:'hometown', title:'工作城市离你家乡有多远？', options:[
    { label:'就在家附近，骑车能到', val:'near', score:2 },
    { label:'同城市或同省，偶尔能回', val:'same_prov', score:1.5 },
    { label:'跨省，逢年过节才回', val:'far', score:0.5 },
    { label:'很远，回一次要大半天', val:'very_far', score:0 }
  ]},
  { key:'commute', title:'你每天单程通勤时间大概多久？', options:[
    { label:'15分钟以内，幸福感拉满', val:'short', score:2 },
    { label:'15到30分钟，还行', val:'mid', score:1.5 },
    { label:'30到60分钟，有点累', val:'long', score:0.8 },
    { label:'1小时以上，路上就废了', val:'very_long', score:0 }
  ]},
  { key:'rest', title:'你的休息制度是？', options:[
    { label:'双休，雷打不动', val:'two_day', score:2 },
    { label:'大小周，凑合', val:'alt', score:1 },
    { label:'单休，就一天', val:'one_day', score:0.5 },
    { label:'几乎没有固定休息', val:'none', score:0 }
  ]},
  { key:'hours', title:'你平时几点上班、几点下班？', options:[
    { label:'9点上到6点下，正常人时间', val:'normal', score:2 },
    { label:'8点上到7点下，稍微长一点', val:'slightly_long', score:1.2 },
    { label:'8点上到9点下，10小时以上', val:'long', score:0.4 },
    { label:'早八晚十以上，接近996', val:'extreme', score:0 }
  ]},
  { key:'overtime', title:'加班情况怎么样？', options:[
    { label:'基本不加班，到点走人', val:'no', score:2 },
    { label:'偶尔加班，有加班费', val:'sometimes_paid', score:1.5 },
    { label:'偶尔加班，没有加班费', val:'sometimes_free', score:0.8 },
    { label:'经常加班，身体有点吃不消', val:'often', score:0.2 },
    { label:'天天加班，已经麻木了', val:'always', score:0 }
  ]},
  { key:'salary', title:'你目前的税后月薪大概在哪个区间？', options:[
    { label:'3000元以下', val:'s1', score:0 },
    { label:'3000到6000元', val:'s2', score:0.5 },
    { label:'6000到10000元', val:'s3', score:1 },
    { label:'10000到15000元', val:'s4', score:1.5 },
    { label:'15000到20000元', val:'s5', score:1.8 },
    { label:'20000元以上', val:'s6', score:2 }
  ]},
  { key:'atmosphere', title:'工作氛围和人际关系怎么样？', options:[
    { label:'同事融洽，领导靠谱，上班不内耗', val:'good', score:2 },
    { label:'还行，没什么大矛盾', val:'ok', score:1.2 },
    { label:'一般，偶尔有点压抑', val:'mid', score:0.5 },
    { label:'氛围差，领导难搞，内耗严重', val:'bad', score:0 }
  ]},
  { key:'freetime', title:'下班后你有属于自己的时间吗？', options:[
    { label:'有，下班就是我的时间，爱干嘛干嘛', val:'yes', score:2 },
    { label:'有一点，但经常被消息打扰', val:'partial', score:1 },
    { label:'很少，下班了还要处理工作', val:'little', score:0.3 },
    { label:'几乎没有，工作占满了生活', val:'no', score:0 }
  ]}
];

function updateProgress() {
  const pct = Math.round((currentStep / (TOTAL_STEPS - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = '第 ' + (currentStep + 1) + ' / ' + TOTAL_STEPS + ' 题';
}

function renderStep(idx) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('result').style.display = 'none';
  var cfg = flow[idx];
  if (idx > 0) {
    document.getElementById('title-' + idx).textContent = cfg.title;
    renderOptions('opts-' + idx, cfg.options, cfg.key);
  } else {
    renderOptions('opts-0', cfg.options, cfg.key);
  }
  document.getElementById('step-' + idx).classList.add('active');
  updateProgress();
}

function renderOptions(containerId, options, key) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  options.forEach(function(opt) {
    var btn = document.createElement('div');
    btn.className = 'opt-btn';
    btn.textContent = opt.label;
    btn.dataset.val = opt.val;
    if (answers[key] === opt.val) { btn.classList.add('selected'); }
    btn.addEventListener('click', function() {
      container.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      answers[key] = opt.val;
    });
    container.appendChild(btn);
  });
}

function nextStep() {
  var cfg = flow[currentStep];
  if (!answers[cfg.key]) { alert('请先选择一项'); return; }
  currentStep++;
  if (currentStep >= TOTAL_STEPS) { calcScore(); return; }
  renderStep(currentStep);
}

function prevStep() {
  if (currentStep <= 0) return;
  currentStep--;
  renderStep(currentStep);
}

function calcScore() {
  var total = 0, maxTotal = 0;
  flow.forEach(function(cfg) {
    var opt = cfg.options.find(function(o) { return o.val === answers[cfg.key]; });
    if (opt) total += opt.score;
    maxTotal += Math.max.apply(null, cfg.options.map(function(o) { return o.score; }));
  });
  var ratio = total / maxTotal;
  var score = Math.round(ratio * 11 - 1);
  score = Math.max(-1, Math.min(10, score));
  showResult(score);
}

function showResult(score) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('result').style.display = 'block';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('stepCounter').textContent = '';
  document.getElementById('scoreNum').textContent = score;

  var sector = answers['sector'];
  var overtime = answers['overtime'];
  var freetime = answers['freetime'];
  var salary = answers['salary'];
  var hometown = answers['hometown'];
  var atmosphere = answers['atmosphere'];

  var tag = '', msg = '', color = '';

  if (score >= 8) {
    color = '#8e44ad';
    tag = '🌟 人生赢家';
    if (sector === 'public') {
      msg = '铁饭碗端得稳稳的，双休准时下班，这日子过得……不是哥们？给我推一下你们单位还招人吗？';
    } else if (salary === 's6' || salary === 's5') {
      msg = '体制外还能混成这样，大佬本佬，顶礼膜拜。说真的，你们公司还缺人吗？帮我内推一下？';
    } else {
      msg = '工作稳、钱到位、还有自己的时间，这配置说出去要被人拉黑的。不是哥们，工作给我推一下呗？';
    }
  } else if (score >= 6) {
    color = '#27ae60';
    tag = '🙂 还不错';
    msg = '整体来说生活质量挺好的，没什么大问题。继续保持，有空再想想有没有什么能让自己更开心的事。';
  } else if (score >= 3) {
    color = '#f39c12';
    tag = '😐 将就着过';
    if (overtime === 'often' || overtime === 'always') {
      msg = '加班加到麻木，下班还要处理消息——你不是在打工，你是在燃烧自己。记得留一点火给自己，你不只是一个工具人。';
    } else if (freetime === 'no' || freetime === 'little') {
      msg = '工作占满了你的生活，连喘口气的时间都快没了。多爱自己一点，生活不只有工作，你也值得有自己的时间。';
    } else if (salary === 's1' || salary === 's2') {
      msg = '钱没给够，委屈倒是受了不少。你付出的值得被更好地回报，别让廉价的薪资定义你的价值。';
    } else {
      msg = '生活还凑合，但总感觉少点什么。偶尔停下来想想自己真正想要什么，别只是惯性地往前跑。';
    }
  } else if (score >= 0) {
    color = '#e67e22';
    tag = '😟 有些低迷';
    if ((hometown === 'far' || hometown === 'very_far') && (freetime === 'no' || freetime === 'little')) {
      msg = '一个人漂在外面，工作还占满了所有时间，这种日子真的不容易。偶尔想家了就回去看看，别把自己逼得太紧，你已经很拼了。';
    } else if (atmosphere === 'bad') {
      msg = '烂环境待久了容易开始怀疑自己，但问题真的不在你。离开一个消耗你的地方，不是逃跑，是对自己负责。';
    } else {
      msg = '现在的状态确实不太好，但每一个低谷都是转折的起点。先把自己照顾好，其他的慢慢来。';
    }
  } else {
    color = '#e74c3c';
    tag = '😔 撑着呢';
    msg = '钱少、加班多、没有自己的时间，还要忍受糟糕的环境——这日子过得，换我我也撑不住。但你还在，已经很厉害了。现在最重要的一件事：多爱自己一点，你不欠任何人一个燃尽自己的理由。';
  }

  document.getElementById('scoreCircle').style.background = color;
  document.getElementById('scoreTag').textContent = tag;
  document.getElementById('scoreTag').style.color = color;
  document.getElementById('scoreMsg').textContent = msg;
}

function restart() {
  Object.keys(answers).forEach(function(k) { delete answers[k]; });
  currentStep = 0;
  document.getElementById('result').style.display = 'none';
  renderStep(0);
}
window.onload = function() {
  renderOptions('opts-0', flow[0].options, flow[0].key);
  updateProgress();
};

</script>
</body>
</html>
